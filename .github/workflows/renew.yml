name: GuppyNodes Auto Renew Matrix

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Runtime
        uses: actions/checkout@v4

      - name: Checkout Private Core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/GuppyNodes-scripts
          token: ${{ secrets.GH_PAT }} 
          path: scripts

      - name: Deploy Runtime Dependencies
        run: pip install --quiet curl_cffi pynacl

      - name: Execute Intercept Pipeline
        env:
          COOKIE:       ${{ secrets.COOKIE }}
          GH_PAT:       ${{ secrets.GH_PAT }} 
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          PROXY_NODE:   ${{ secrets.PROXY_NODE }}
        run: python scripts/renew.py

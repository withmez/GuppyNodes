name: GuppyNodes Renew

on:
  schedule:
    # 每 20 天的 04:30 UTC 运行一次
    - cron: '30 4 */20 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 🌟 必须在这里显式声明 actions: write，gh CLI 才有权限删除日志
    permissions:
      actions: write
      contents: read

    steps:
      # ── 1. 检出公共仓库 ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 检出私有脚本仓库 ───────────────────────────────────
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/GuppyNodes-scripts
          token: ${{ secrets.GH_PAT }} 
          path: scripts
          
      # ── 3. 设置 Python 环境 ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4. 安装核心依赖 (Playwright & 下载 Sing-box) ──────────
      - name: Install System & Python Dependencies
        run: |
          pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium
          
          # 下载官方原生高性能 Sing-box 核心并移动到系统 PATH 中
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.8.5/sing-box-1.8.5-linux-amd64.tar.gz
          tar -xvf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box

      # ── 5. 强力穿盾：执行全包办式 Python 脚本 ────────────────────
      - name: Execute Browser Automation Script
        env:
          GUPPY_USERNAME: ${{ secrets.GUPPY_USERNAME }}
          GUPPY_PASSWORD: ${{ secrets.GUPPY_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }} # 可选
        run: |
          
          python renew.py
  
      # ── 6. 异常熔断机制：失败时上传现场截图 ─────────────────────
      - name: Upload Error Screenshot if Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cf-block-screenshot
          path: scripts/cf_block_error.png
          retention-days: 3
  
      # ── 7. 官方原生机制清理日志 (只保留最近 5 次，替代老旧插件) ──
      - name: Auto Clean Workflow History (Keep Last 5)
        if: always() # 确保无论脚本成功还是失败，都会触发日志清理
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 使用内置令牌即可
        run: |
          echo "[*] 正在通过 GitHub 官方 CLI 审计运行日志历史..."
          # 获取当前工作流名称下的所有历史运行 ID，排除掉当前正在运行的这一次，并跳过最新的 5 次
          RUN_IDS=$(gh run list --workflow "${{ github.workflow }}" --json databaseId --limit 100 | jq -r '.[].databaseId' | grep -v "${{ github.run_id }}" | tail -n +6)
          
          if [ -z "$RUN_IDS" ]; then
            echo "[+] 运行历史记录少于 5 次，无需进行裁剪清理。"
          else
            for id in $RUN_IDS; do
              echo "[*] 正在安全擦除历史沉淀日志 ID: #$id"
              gh run delete "$id" || true
            done
            print "[+] 裁剪完毕，严格锁定保留最新 5 次历史记录。"
          fi

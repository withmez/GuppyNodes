name: GuppyNodes Renew

on:
  schedule:
    # 每 20 天的 04:30 UTC 运行一次
    - cron: '30 4 */20 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 检出公共仓库 ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 检出私有脚本仓库 ───────────────────────────────────
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/GuppyNodes-scripts
          token: ${{ secrets.GH_PAT }} 
          path: scripts
          
      # ── 3. 设置 Python 环境 ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4. 安装核心依赖 (Playwright & 下载 Sing-box) ──────────
      - name: Install System & Python Dependencies
        run: |
          pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium
          
          # 下载官方原生高性能 Sing-box 核心并移动到系统 PATH 中
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.8.5/sing-box-1.8.5-linux-amd64.tar.gz
          tar -xvf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box

      # ── 5. 强力穿盾：执行全包办式 Python 脚本 ────────────────────
      - name: Execute Browser Automation Script
        env:
          GUPPY_USERNAME: ${{ secrets.GUPPY_USERNAME }}
          GUPPY_PASSWORD: ${{ secrets.GUPPY_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }} # 可选：支持各种原生节点/订阅链接，不填则自动直连
        run: |
          python renew.py
  
      # ── 6. 异常熔断机制：失败时上传现场截图 ─────────────────────
      - name: Upload Error Screenshot if Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cf-block-screenshot
          path: scripts/cf_block_error.png
          retention-days: 3
  
      # ── 7. 日志压缩审计：保留最近 5 次历史记录 ─────────────────
      - name: Auto Clean Workflow History (Keep Last 5)
        uses: Actions-R-Us/delete-workflow-runs@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5

name: GuppyNodes Auto Renew Matrix

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Runtime Base
        uses: actions/checkout@v4

      # 🔐 核心安全屏障：使用 GH_PAT 动态将私有仓库的脚本拉取到本地
      - name: Checkout Private Core Suite
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/GuppyNodes-scripts
          token: ${{ secrets.GH_PAT }} 
          path: scripts

      # ✨ 一键统一部署 Python 运行依赖
      - name: Deploy Runtime Dependencies
        run: pip install --quiet curl_cffi pynacl

      # 🚀 纯净执行管线：不再从外部 import，所有节点判断与 sing-box 唤醒交由脚本底层闭环
      - name: Execute Intercept Pipeline
        env:
          COOKIE:       ${{ secrets.COOKIE }}
          GH_PAT:       ${{ secrets.GH_PAT }} 
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          PROXY_NODE:   ${{ secrets.PROXY_NODE }}
        run: |
          python3 scripts/renew.py

      # =======================================================
      # 🛠️ 独立运维功能：完全解耦，严格只留存最近 3 次运行记录
      # =======================================================
      - name: Purge Obsolete Workflow History
        uses: Mattraks/delete-workflow-runs@v2
        if: always() # 强制触发，无论续期成功或失败均进行收尾清理
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3 # 严格留存最后 3 次历史记录
